# Remove EthPM module references
# from web3 import EthPM, web3.pm, etc.
id: ethpm-removal
language: python

rule:
  any:
    - kind: import_statement
      has:
        pattern: "EthPM"
    - kind: import_statement
      has:
        pattern: "web3.pm"
    - pattern: "web3.pm"
    - pattern: "web3.ethpm"
