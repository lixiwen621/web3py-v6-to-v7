# Middleware class renames: name_to_address_middleware -> ENSNameToAddressMiddleware
# geth_poa_middleware -> ExtraDataToPOAMiddleware
id: middleware-class-renames
language: python

rewriters:
  - id: rename-name-to-address
    rule:
      pattern: "name_to_address_middleware"
    fix: ENSNameToAddressMiddleware

  - id: rename-geth-poa
    rule:
      pattern: "geth_poa_middleware"
    fix: ExtraDataToPOAMiddleware

rule:
  any:
    - pattern: "name_to_address_middleware"
    - pattern: "geth_poa_middleware"
