# Remove LRU class and lru-dict dependency references
id: lru-removal
language: python

rule:
  any:
    - kind: import_statement
      has:
        pattern: "LRU"
    - kind: import_statement
      has:
        pattern: "lru_dict"
    - kind: import_statement
      has:
        pattern: "lru-dict"
    - pattern: "LRU"
